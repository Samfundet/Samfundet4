name: Verify

# https://github.com/reviewdog/action-eslint/issues/29#issuecomment-985939887
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

# Prevent multiple workflows with same branch/pull_request.
concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  job_verify_backend:
    name: Verify backend
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    services:
      sm4_dev_database:
        image: postgres:15
        env:
          POSTGRES_DB: sm4DB
          POSTGRES_USER: sm4DB
          POSTGRES_PASSWORD: sm4DB
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      billig_dev_database:
        image: postgres:15
        env:
          POSTGRES_DB: billigDB
          POSTGRES_USER: billigDB
          POSTGRES_PASSWORD: billigDB
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      mdb_dev:
        image: postgres:15
        env:
          POSTGRES_DB: mdb2
          POSTGRES_USER: mdb2
          POSTGRES_PASSWORD: mdb2
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
    defaults:
      run:
        working-directory: ./backend
    env:
      ENV: development
      SECRET_KEY: NOT SET
      DJANGO_SETTINGS_MODULE: root.settings
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: Django123
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_FIRST_NAME: Sanctus
      DJANGO_SUPERUSER_LAST_NAME: Richardus
      DJANGO_SUPERUSER_PHONE_NUMBER: 12345678
      SM4_DEV_CREDENTIAL: sm4DB
      BILLIG_DEV_CREDENTIAL: billigDB
      MDB_DEV_CREDENTIAL: mdb2
      SM4_DEV_HOST: localhost
      BILLIG_DEV_HOST: localhost
      MDB_DEV_HOST: localhost
      SM4_DEV_PORT: 5432
      BILLIG_DEV_PORT: 5433
      MDB_DEV_PORT: 5434

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          source aliases.sh
          uv-sync-pipeline

      - name: Run ruff
        run: |
          source aliases.sh
          uv-run-ruff-check

      - name: Check ruff format
        run: |
          source aliases.sh
          uv-run-ruff-format-check

      - name: Verify migrations
        run: |
          source aliases.sh
          uv-run-migrations-verify
          uv-run-migrations-apply

      - name: Run tests
        run: |
          source aliases.sh
          uv-run-pytest-run

      - name: Run mypy
        run: |
          source aliases.sh
          uv-run-mypy-run

      - name: Run seeds
        run: |
          source aliases.sh
          uv-run-seed

  job_verify_docker:
    name: Verify docker
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup environment
        run: |
          touch backend/.docker.env
          echo ENV=development >> backend/.docker.env
          echo SECRET_KEY=NOT_SET >> backend/.docker.env
          echo DJANGO_SETTINGS_MODULE=root.settings >> backend/.docker.env
          echo DOMAIN=* >> backend/.docker.env
          touch frontend/.env.docker
          echo VITE_GOATCOUNTER_CODE=samfundet-dev >> frontend/.env.docker
          echo VITE_BACKEND_DOMAIN=http://backend:8000 >> frontend/.env.docker
          echo VITE_CYPRESS_BACKEND_DOMAIN=http://backend:8000 >> frontend/.env.docker
          echo VITE_CYPRESS_BASE_URL=http://frontend:3000 >> frontend/.env.docker

      - name: Build images
        run: docker compose --env-file .env.example build backend frontend storybook

      - name: Start containers
        run: docker compose --env-file .env.example up backend frontend storybook -d; sleep 20 # Give additional seconds to boot.

      - name: Check running containers
        # Will fail if container isn't running.
        run: |
          docker compose --env-file .env.example exec backend echo 
          docker compose --env-file .env.example exec frontend echo
          docker compose --env-file .env.example exec storybook echo

      # - name: Seed backend for Cypress tests
      #   run: docker compose exec backend uv run python manage.py seed_cypress

      # - name: Run cypress
      #   run: docker compose up cypress

      - name: Stop containers
        run: docker compose --env-file .env.example down

  job_verify_frontend_lint:
    name: Verify frontend
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install modules
        run: yarn install

      - name: Run Biome
        run: yarn run biome:ci

      - name: Run stylelint
        run: yarn run stylelint:check

      - name: Run typescript compiler check
        run: yarn run tsc:check
